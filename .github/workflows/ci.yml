name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: farmora
          POSTGRES_PASSWORD: farmora
          POSTGRES_DB: farmora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U farmora -d farmora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@farmora/shared
      - run: npm run build --workspace=@farmora/api
      - run: npm run db:generate --workspace=@farmora/api
      - run: npm run db:migrate:deploy --workspace=@farmora/api
        env:
          DATABASE_URL: postgresql://farmora:farmora@localhost:5432/farmora?schema=public
      - name: API health smoke checks
        run: |
          nohup npm run start --workspace=@farmora/api > api.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS "http://localhost:4000/api/v1/ops/live" > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://localhost:4000/api/v1/ops/live"
          curl -fsS "http://localhost:4000/api/v1/ops/ready"
          curl -fsS "http://localhost:4000/api/v1/ops/metrics" | head -n 8
        env:
          DATABASE_URL: postgresql://farmora:farmora@localhost:5432/farmora?schema=public
          REDIS_URL: redis://localhost:6379
          API_PORT: 4000
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
      - run: npm run test --workspace=@farmora/api
        env:
          DATABASE_URL: postgresql://farmora:farmora@localhost:5432/farmora?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
          NODE_ENV: test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@farmora/shared
      - run: npm run build --workspace=@farmora/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
