services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: farmora-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://farmora:farmora_dev_secret@postgres:5432/farmora?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      JWT_ACCESS_SECRET: dev-access-secret-minimum-32-chars
      JWT_REFRESH_SECRET: dev-refresh-secret-minimum-32-chars
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/api/v1/ops/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16-alpine
    container_name: farmora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: farmora
      POSTGRES_PASSWORD: farmora_dev_secret
      POSTGRES_DB: farmora
    ports:
      - "5432:5432"
    volumes:
      - farmora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmora -d farmora"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: farmora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - farmora_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  farmora_pg_data:
  farmora_redis_data:
